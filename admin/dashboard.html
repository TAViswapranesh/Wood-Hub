<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Wood Hub Admin</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Admin Styles -->
    <link rel="stylesheet" href="/admin/css/admin-variables.css">
    <link rel="stylesheet" href="/admin/css/admin-layout.css">
    <link rel="stylesheet" href="/admin/css/admin-components.css">
    <style>
        /* Table Spacing Fix */
        .table th,
        .table td {
            padding: 1.25rem 1.5rem !important;
            /* Increased padding */
        }

        .table {
            width: 100%;
            /* Ensure full width */
            border-collapse: collapse;
            /* Ensure borders collapse for cleaner look */
        }
    </style>
</head>

<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="admin-sidebar-header">
                <a href="dashboard.html" class="admin-sidebar-logo">
                    <i class="fas fa-tree"></i> Wood <span>Hub</span>
                </a>
            </div>

            <nav class="admin-nav">
                <a href="dashboard.html" class="admin-nav-item active">
                    <i class="fas fa-chart-line"></i> Dashboard
                </a>
                <a href="quotations.html" class="admin-nav-item">
                    <i class="fas fa-file-invoice"></i> Quotations
                </a>
                <a href="messages.html" class="admin-nav-item">
                    <i class="fas fa-envelope"></i> Messages
                </a>
                <a href="hardware.html" class="admin-nav-item">
                    <i class="fas fa-tools"></i> Hardware
                </a>
                <a href="gallery.html" class="admin-nav-item">
                    <i class="fas fa-images"></i> Gallery
                </a>
                <a href="#" id="logout-btn" class="admin-nav-item" style="margin-top: auto;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <div class="admin-header">
                <h1>Dashboard</h1>
                <p>Welcome back, <span class="admin-username">Admin</span></p>
            </div>

            <div class="admin-content">
                <!-- Statistics Cards -->
                <div class="admin-grid admin-grid-4">
                    <div class="admin-card stats-card">
                        <div class="stats-label">
                            <i class="fas fa-file-invoice"></i> Quotation Requests
                        </div>
                        <div class="stats-number" id="quotation-count">0</div>
                    </div>

                    <div class="admin-card stats-card success">
                        <div class="stats-label">
                            <i class="fas fa-tools"></i> Hardware Items
                        </div>
                        <div class="stats-number" id="hardware-count">0</div>
                    </div>

                    <div class="admin-card stats-card info">
                        <div class="stats-label">
                            <i class="fas fa-images"></i> Gallery Images
                        </div>
                        <div class="stats-number" id="gallery-count">0</div>
                    </div>

                    <div class="admin-card stats-card warning">
                        <div class="stats-label">
                            <i class="fas fa-envelope"></i> Messages
                        </div>
                        <div class="stats-number" id="message-count">0</div>
                    </div>
                </div>
            </div>
    </div>

    </main>
    </div>

    <!-- Scripts -->
    <script type="module" src="/admin/js/admin-auth.js"></script>
    <script type="module" src="/admin/js/admin-dashboard.js"></script>
    <script>


        // Simple router-like behavior to restore dashboard view
        document.querySelector('a[href="dashboard.html"]').addEventListener('click', (e) => {
            // Let it reload or handle via JS to show main dash
        });
    </script>
</body>

</html>
