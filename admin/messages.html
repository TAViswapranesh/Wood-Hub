<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Wood Hub Admin</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Admin Styles -->
    <link rel="stylesheet" href="css/admin-variables.css">
    <link rel="stylesheet" href="css/admin-layout.css">
    <link rel="stylesheet" href="css/admin-components.css">
    <style>
        /* Table Spacing Fix */
        .table th,
        .table td {
            padding: 1.25rem 1.5rem !important;
            /* Increased padding */
        }

        .table {
            width: 100%;
            /* Ensure full width */
            border-collapse: collapse;
            /* Ensure borders collapse for cleaner look */
        }
    </style>
</head>

<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="admin-sidebar-header">
                <a href="dashboard.html" class="admin-sidebar-logo">
                    <i class="fas fa-tree"></i> Wood <span>Hub</span>
                </a>
            </div>

            <nav class="admin-nav">
                <a href="dashboard.html" class="admin-nav-item">
                    <i class="fas fa-chart-line"></i> Dashboard
                </a>
                <a href="quotations.html" class="admin-nav-item">
                    <i class="fas fa-file-invoice"></i> Quotations
                </a>
                <a href="messages.html" class="admin-nav-item active">
                    <i class="fas fa-envelope"></i> Messages
                </a>
                <a href="hardware.html" class="admin-nav-item">
                    <i class="fas fa-tools"></i> Hardware
                </a>
                <a href="gallery.html" class="admin-nav-item">
                    <i class="fas fa-images"></i> Gallery
                </a>
                <a href="#" id="logout-btn" class="admin-nav-item" style="margin-top: auto;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <div class="admin-header">
                <h1>Messages</h1>
                <p>View and manage customer inquiries</p>
            </div>

            <div class="admin-content">
                <div class="admin-card">
                    <div class="admin-card-header">
                        <h2 class="admin-card-title">Recent Messages</h2>
                    </div>
                    <div class="admin-card-body">
                        <div class="table-responsive">
                            <table class="admin-table">
                                <thead>
                                    <tr>
                                        <th>Date</th>
                                        <th>Name</th>
                                        <th>Mobile</th>
                                        <th>Email</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="messages-table-body">
                                    <!-- Messages will be loaded here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/admin-auth.js"></script>
    <script type="module" src="js/admin-messages.js"></script>
</body>

</html>
