<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Management - Wood Hub Admin</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Admin Styles -->
    <link rel="stylesheet" href="css/admin-variables.css">
    <link rel="stylesheet" href="css/admin-layout.css">
    <link rel="stylesheet" href="css/admin-components.css">
</head>

<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="admin-sidebar-header">
                <a href="dashboard.html" class="admin-sidebar-logo">
                    <i class="fas fa-tree"></i> Wood <span>Hub</span>
                </a>
            </div>

            <nav class="admin-nav">
                <a href="dashboard.html" class="admin-nav-item">
                    <i class="fas fa-chart-line"></i> Dashboard
                </a>
                <a href="hardware.html" class="admin-nav-item">
                    <i class="fas fa-tools"></i> Hardware
                </a>
                <a href="gallery.html" class="admin-nav-item">
                    <i class="fas fa-images"></i> Gallery
                </a>
                <a href="quotations.html" class="admin-nav-item">
                    <i class="fas fa-file-invoice"></i> Quotations
                </a>
                <a href="#" id="logout-btn" class="admin-nav-item" style="margin-top: auto;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <div class="admin-header">
                <h1>Gallery Management</h1>
                <p>Upload and manage gallery images</p>
            </div>

            <div class="admin-content">
                <!-- Upload Section -->
                <div class="admin-card mb-xl">
                    <div class="admin-card-header">
                        <h2 class="admin-card-title">Upload Images</h2>
                    </div>
                    <div class="admin-card-body">
                        <div class="file-upload">
                            <input type="file" id="gallery-upload" accept="image/*" multiple>
                            <label for="gallery-upload" class="file-upload-label">
                                <i class="fas fa-cloud-upload-alt"></i>
                                <div style="margin-top: var(--admin-space-md);">
                                    <strong>Click to upload images</strong>
                                </div>
                                <small
                                    style="color: var(--admin-text-tertiary); margin-top: var(--admin-space-sm); display: block;">
                                    Supports multiple images. Max size: 2MB per image
                                </small>
                            </label>
                        </div>

                        <div class="alert alert-info mt-lg">
                            <strong>Note:</strong> Images are stored in browser localStorage. For production use,
                            implement proper backend file storage.
                        </div>
                    </div>
                </div>

                <!-- Gallery Grid -->
                <div class="admin-card">
                    <div class="admin-card-header">
                        <h2 class="admin-card-title">Gallery Images</h2>
                    </div>
                    <div class="admin-card-body">
                        <div id="gallery-grid" class="gallery-grid">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/admin-auth.js"></script>
    <script src="js/admin-gallery.js"></script>
</body>

</html>
