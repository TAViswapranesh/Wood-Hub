<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardware Management - Wood Hub Admin</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Admin Styles -->
    <link rel="stylesheet" href="css/admin-variables.css">
    <link rel="stylesheet" href="css/admin-layout.css">
    <link rel="stylesheet" href="css/admin-components.css">
</head>

<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="admin-sidebar-header">
                <a href="dashboard.html" class="admin-sidebar-logo">
                    <i class="fas fa-tree"></i> Wood <span>Hub</span>
                </a>
            </div>

            <nav class="admin-nav">
                <a href="dashboard.html" class="admin-nav-item">
                    <i class="fas fa-chart-line"></i> Dashboard
                </a>
                <a href="hardware.html" class="admin-nav-item">
                    <i class="fas fa-tools"></i> Hardware
                </a>
                <a href="gallery.html" class="admin-nav-item">
                    <i class="fas fa-images"></i> Gallery
                </a>
                <a href="quotations.html" class="admin-nav-item">
                    <i class="fas fa-file-invoice"></i> Quotations
                </a>
                <a href="#" id="logout-btn" class="admin-nav-item" style="margin-top: auto;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <div class="admin-header">
                <h1>Hardware Management</h1>
                <p>Add, edit, and manage hardware products</p>
            </div>

            <div class="admin-content">
                <!-- Add/Edit Hardware Form -->
                <div class="admin-card mb-xl">
                    <div class="admin-card-header">
                        <h2 class="admin-card-title" id="form-title">Add New Hardware</h2>
                    </div>
                    <div class="admin-card-body">
                        <form id="hardware-form">
                            <input type="hidden" id="edit-id" value="">
                            <input type="hidden" id="image-data" value="">

                            <div class="admin-grid admin-grid-2">
                                <div class="form-group">
                                    <label for="name" class="form-label">Product Name *</label>
                                    <input type="text" id="name" name="name" class="form-control"
                                        placeholder="e.g., Door Handle, Window Lock" required>
                                </div>

                                <div class="form-group">
                                    <label for="category" class="form-label">Primary Category *</label>
                                    <select id="category" name="category" class="form-control" required>
                                        <option value="">Select Category</option>
                                        <!-- Categories populated by JS -->
                                    </select>
                                </div>

                                <div class="form-group">
                                    <label for="subcategory" class="form-label">Subcategory</label>
                                    <input type="text" id="subcategory" name="subcategory" class="form-control"
                                        placeholder="e.g., Lever Handle, Sliding Lock">
                                </div>

                                <div class="form-group">
                                    <label for="size" class="form-label">Size / Dimension</label>
                                    <input type="text" id="size" name="size" class="form-control"
                                        placeholder="e.g., 6 inch, 150mm">
                                </div>

                                <div class="form-group">
                                    <label for="color" class="form-label">Color</label>
                                    <input type="text" id="color" name="color" class="form-control"
                                        placeholder="e.g., Silver, Black, Gold">
                                </div>

                                <div class="form-group">
                                    <label for="image" class="form-label">Product Image</label>
                                    <div class="file-upload">
                                        <input type="file" id="image" name="image" accept="image/*">
                                        <label for="image" class="file-upload-label">
                                            <i class="fas fa-cloud-upload-alt"></i>
                                            <div>Click to upload image</div>
                                            <small style="color: var(--admin-text-tertiary);">Max size: 2MB</small>
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <!-- Image Preview -->
                            <div id="image-preview" class="image-preview" style="display: none;"></div>

                            <div class="mt-lg">
                                <button type="submit" id="submit-btn" class="btn btn-primary btn-lg">
                                    <i class="fas fa-plus"></i> Add Hardware
                                </button>
                                <button type="reset" class="btn btn-secondary btn-lg">
                                    <i class="fas fa-redo"></i> Reset
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Hardware List -->
                <div class="admin-card">
                    <div class="admin-card-header">
                        <h2 class="admin-card-title">Hardware Items</h2>
                    </div>
                    <div class="admin-card-body">
                        <div id="hardware-list">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/admin-auth.js"></script>
    <script src="js/admin-hardware.js"></script>
</body>

</html>
