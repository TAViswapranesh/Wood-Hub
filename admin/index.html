<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Wood Hub</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Admin Styles -->
    <link rel="stylesheet" href="css/admin-variables.css">
    <link rel="stylesheet" href="css/admin-layout.css">
    <link rel="stylesheet" href="css/admin-components.css">
</head>

<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1><i class="fas fa-tree"></i> Wood Hub</h1>
                <p>Admin Panel Login</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label for="username" class="form-label">
                        <i class="fas fa-user"></i> Username
                    </label>
                    <input type="text" id="username" class="form-control" placeholder="Enter username" required
                        autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <input type="password" id="password" class="form-control" placeholder="Enter password" required
                        autocomplete="current-password">
                </div>

                <div id="login-error" class="alert alert-danger" style="display: none;"></div>

                <button type="submit" class="btn btn-primary btn-lg btn-block">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <div class="text-center mt-lg">
                <p style="color: var(--admin-text-tertiary); font-size: var(--admin-font-sm);">
                    Default credentials: admin / admin123
                </p>
            </div>
        </div>
    </div>

    <!-- Authentication Script -->
    <!-- Authentication Script -->
    <script type="module" src="js/admin-auth.js"></script>
</body>

</html>
